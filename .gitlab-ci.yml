# GitLab CI - validate platform on merge requests
# As of March 2026

stages:
  - validate

validate:
  stage: validate
  image: alpine/k8s:1.28.2
  before_script:
    - apk add --no-cache bash
    - chmod +x scripts/*.sh
  script:
    - ./scripts/validate.sh
    - ./scripts/policy-check.sh
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "master" || $CI_COMMIT_BRANCH == "main"
