apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: stage
resources:
  - ../../base
patches:
  - target:
      kind: Deployment
      name: example-app
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: example-app
      spec:
        replicas: 2
        template:
          spec:
            containers:
              - name: example-app
                image: example.com/example-app:staging
