# Dev overlay — namespace, replicas, image tag
# Policy checks may fail; promotion to stage blocked until fixed
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: dev
resources:
  - ../../base
patches:
  - target:
      kind: Namespace
      name: demo-app
    patch: |-
      apiVersion: v1
      kind: Namespace
      metadata:
        name: dev
  - target:
      kind: Deployment
      name: demo-app
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: demo-app
      spec:
        replicas: 1
        template:
          spec:
            containers:
              - name: app
                image: registry.example.com/demo-github-argo-insecure-app:dev
