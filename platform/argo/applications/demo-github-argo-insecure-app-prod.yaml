# Argo CD Application - demo-github-argo-insecure-app (prod)
# Promotion: stage → prod (requires manual approval, pinned image)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: demo-github-argo-insecure-app-prod
  namespace: argocd
  labels:
    app.kubernetes.io/name: demo-github-argo-insecure-app
    environment: prod
spec:
  project: default
  source:
    repoURL: https://github.com/LongTheta/gitops-platform.git
    path: platform/apps/demo-github-argo-insecure-app/overlays/prod
    targetRevision: HEAD
  destination:
    server: https://kubernetes.default.svc
    namespace: prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
