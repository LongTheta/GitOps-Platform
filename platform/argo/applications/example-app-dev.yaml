# Argo CD Application - example-app (dev)
# Point source to this repo; path to platform/apps/example-app/overlays/dev
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: example-app-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/example/gitops-platform.git
    path: platform/apps/example-app/overlays/dev
    targetRevision: HEAD
  destination:
    server: https://kubernetes.default.svc
    namespace: dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
