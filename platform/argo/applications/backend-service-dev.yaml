# Argo CD Application - backend-service (dev)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: backend-service-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/example/gitops-platform.git
    path: platform/apps/backend-service/overlays/dev
    targetRevision: HEAD
  destination:
    server: https://kubernetes.default.svc
    namespace: dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
