# Example Secret for Argo CD git push (repository-push)
# Create in argocd-push namespace. Restrict to allowed repos/branches via SCM.
#
# kubectl create namespace argocd-push
# Replace placeholders, then: kubectl apply -f repository-push-secret.example.yaml

apiVersion: v1
kind: Secret
metadata:
  name: gitops-repo-push
  namespace: argocd-push
  labels:
    argocd.argoproj.io/secret-type: repository-push
type: Opaque
stringData:
  url: https://example.com/my-platform/gitops-repo.git
  username: git
  password: <GITLAB_TOKEN_OR_PAT>
# Or use sshKey for SSH-based repos
