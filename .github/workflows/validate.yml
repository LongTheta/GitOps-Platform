# Validate platform manifests and structure on PR and push
name: Validate

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup kustomize
        uses: imranismail/setup-kustomize@v2
        with:
          kustomize-version: "5.8.0"

      - name: Validate platform
        run: |
          chmod +x scripts/validate.sh
          ./scripts/validate.sh

      - name: Kustomize build (smoke test)
        run: |
          for env in dev stage prod; do
            echo "Building platform/environments/$env..."
            kustomize build platform/environments/$env
          done

      - name: Policy check
        run: python scripts/policy-enforcement-agent.py
